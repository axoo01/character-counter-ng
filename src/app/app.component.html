<cc-header (themeChanged)="onThemeChange($event)"></cc-header>

<main class="container">
  <h1>Analyze your text<br>in real-time.</h1>
  
  <cc-text-input 
    [readingTime]="readingTime"
    (textChanged)="handleTextChange($event)"
    (configChanged)="handleConfigChange($event)">
  </cc-text-input>

  <cc-stats 
    [charCount]="charCount" 
    [wordCount]="wordCount" 
    [sentenceCount]="sentenceCount">
  </cc-stats>
</main>
